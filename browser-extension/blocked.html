<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Blocked - Clarity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1f2937;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 600px;
    }

    h1 {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
      color: #1f2937;
    }

    .subtitle {
      font-size: 18px;
      color: #6b7280;
      margin-bottom: 48px;
      line-height: 1.6;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 14px;
    }

    .stats {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 32px;
      margin-bottom: 32px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .stat-row:last-child {
      border-bottom: none;
    }

    .stat-label {
      font-size: 13px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 500;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: #1f2937;
      font-family: 'Courier New', monospace;
    }

    .buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      padding: 14px 32px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-primary {
      background: #1f2937;
      color: white;
    }

    .btn-primary:hover {
      background: #374151;
    }

    .btn-secondary {
      background: white;
      color: #1f2937;
      border: 1px solid #e5e7eb;
    }

    .btn-secondary:hover {
      background: #f9fafb;
    }

    .quote {
      margin-top: 48px;
      font-size: 16px;
      font-style: italic;
      color: #6b7280;
      line-height: 1.8;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    .divider {
      height: 1px;
      background: #e5e7eb;
      margin: 48px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Clarity</h1>

    <p class="subtitle">
      Site Blocked During Focus Session
    </p>
    <div class="divider"></div>
    <p class="quote" id="quote">
      "The successful warrior is the average man, with laser-like focus."
    </p>
  </div>

  <script type="module">
    import { supabase } from './supabase-client.js';

    const quotes = [
      "The successful warrior is the average man, with laser-like focus.",
      "Concentrate all your thoughts upon the work in hand. The sun's rays do not burn until brought to a focus.",
      "Focus is a matter of deciding what things you're not going to do.",
      "The shorter way to do many things is to only do one thing at a time.",
      "Starve your distractions, feed your focus.",
      "It's not always that we need to do more but rather that we need to focus on less.",
      "Where focus goes, energy flows.",
      "The key to success is to focus our conscious mind on things we desire not things we fear."
    ];

    // Display random quote
    const quoteEl = document.getElementById('quote');
    quoteEl.textContent = quotes[Math.floor(Math.random() * quotes.length)];

    // Log this blocked attempt
    async function logBlockedAttempt() {
      try {
        const { data: { user } } = await supabase.getUser();
        if (!user) return;

        const attemptedUrl = window.location.href;
        const urlParams = new URLSearchParams(window.location.search);
        const blockedUrl = urlParams.get('url') || attemptedUrl;

        // Get active blocking session
        const { data: session } = await supabase
          .from('active_blocking_sessions')
          .select('*')
          .eq('user_id', user.id)
          .eq('is_active', true)
          .maybeSingle();

        if (session) {
          // Only log blocked attempt if session is not paused
          if (!session.is_paused) {
            await supabase
              .from('blocked_attempts')
              .insert({
                user_id: user.id,
                blocking_session_id: session.id,
                url_pattern: '*',
                attempted_url: blockedUrl,
              });

            // Update blocked count display (increment by 1 since trigger will update DB)
            document.getElementById('blocked-count').textContent = session.blocked_attempts_count + 1;
          } else {
            // Session is paused, just show current count
            document.getElementById('blocked-count').textContent = session.blocked_attempts_count || 0;
          }
        }
      } catch (error) {
        console.error('Error logging blocked attempt:', error);
      }
    }

    // Update session timer
    async function updateTimer() {
      try {
        const { data: { user } } = await supabase.getUser();
        if (!user) return;

        const { data: session } = await supabase
          .from('active_blocking_sessions')
          .select('*')
          .eq('user_id', user.id)
          .eq('is_active', true)
          .maybeSingle();

        if (session) {
          const startTime = new Date(session.started_at);
          const now = new Date();
          const durationSeconds = Math.floor((now - startTime) / 1000);

          const hours = Math.floor(durationSeconds / 3600);
          const minutes = Math.floor((durationSeconds % 3600) / 60);
          const seconds = durationSeconds % 60;

          if (hours > 0) {
            document.getElementById('session-timer').textContent =
              `${hours}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
          } else {
            document.getElementById('session-timer').textContent =
              `${minutes}:${seconds.toString().padStart(2, '0')}`;
          }

          document.getElementById('blocked-count').textContent = session.blocked_attempts_count || 0;
        }
      } catch (error) {
        console.error('Error updating timer:', error);
      }
    }

    // Event listeners (no inline handlers for CSP compliance)
    document.getElementById('dashboard-btn').addEventListener('click', () => {
      window.location.href = 'http://localhost:8080/dashboard';
    });

    document.getElementById('back-btn').addEventListener('click', () => {
      window.history.back();
    });

    // Run on page load
    logBlockedAttempt();
    updateTimer();

    // Update timer every second
    setInterval(updateTimer, 1000);
  </script>
</body>
</html>
